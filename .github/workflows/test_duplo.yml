name: Test DuploCloud Version

on:
  workflow_dispatch:
    inputs:
      duploctl-version:
        description: "duploctl version to test (e.g. 0.4.3)"
        required: false
        default: "0.4.3"

env:
  DUPLO_HOST: ${{ vars.DUPLO_HOST }}
  DUPLO_TOKEN: ${{ secrets.DUPLO_TOKEN }}

jobs:
  test-version:
    name: Verify duploctl Version
    runs-on: ubuntu-latest

    steps:
      - name: Setup DuploCloud (default — no version pin)
        id: setup-default
        uses: duplocloud/actions@v0.0.14
        with:
          mask-account-id: "false"

      - name: Check version installed by default
        run: |
          echo "=== Default (v0.0.14 tag default) ==="
          duploctl --version

      - name: Setup DuploCloud (explicit version pin)
        id: setup-pinned
        uses: duplocloud/actions@v0.0.14
        with:
          mask-account-id: "false"
          version: ${{ inputs.duploctl-version }}

      - name: Check version installed with explicit pin
        run: |
          echo "=== Pinned (${{ inputs.duploctl-version }}) ==="
          duploctl --version

      - name: Assert version matches expected
        run: |
          INSTALLED=$(duploctl --version 2>&1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          EXPECTED="${{ inputs.duploctl-version }}"
          if [ "$INSTALLED" != "$EXPECTED" ]; then
            echo "::error::Version mismatch — expected ${EXPECTED}, got ${INSTALLED}"
            exit 1
          fi
          echo "Version check passed: ${INSTALLED}"
