name: Test DuploCloud Version

on:
  workflow_dispatch:
    inputs:
      duploctl-version:
        description: "duploctl version to test (e.g. 0.4.3)"
        required: false
        default: "0.4.3"

jobs:
  test-version:
    name: Verify duploctl Version
    runs-on: ubuntu-latest

    steps:
      - name: Setup DuploCloud
        uses: duplocloud/actions@v0.0.14
        continue-on-error: true  # portal config fails without real creds; we only care about what pip installs
        with:
          version: ${{ inputs.duploctl-version }}

      - name: Assert version matches expected
        run: |
          INSTALLED=$(pip show duplocloud-client | grep Version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          EXPECTED="${{ inputs.duploctl-version }}"
          echo "Installed: ${INSTALLED}"
          echo "Expected:  ${EXPECTED}"
          if [ "$INSTALLED" != "$EXPECTED" ]; then
            echo "::error::Version mismatch — expected ${EXPECTED}, got ${INSTALLED}"
            exit 1
          fi
          echo "Version check passed: ${INSTALLED}"
