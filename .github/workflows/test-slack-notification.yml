name: Test Slack Notification

on:
  workflow_dispatch:
    inputs:
      simulate_failure:
        description: 'Simulate a deployment failure? (true/false)'
        required: false
        default: 'false'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Simulate Deployment
        run: |
          if [ "${{ github.event.inputs.simulate_failure }}" = "true" ]; then
            echo "Simulating failure..."
            exit 1
          fi
          echo "Simulating successful deployment..."

      - name: Notify successful deployment
        if: success()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_NOTIFICATIONS_WEBHOOK }}
          ACTOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          SHORT_SHA="${SHA:0:7}"
          curl -X POST -H "Content-type: application/json" \
            --data "{\"text\":\"✅ *Test deployment completed successfully.*\nBranch: ${BRANCH} | Commit: ${SHORT_SHA} | By: ${ACTOR} | Run: ${RUN_URL}\"}" \
            "${SLACK_WEBHOOK}"

      - name: Notify failed deployment
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_NOTIFICATIONS_WEBHOOK }}
          ACTOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          SHORT_SHA="${SHA:0:7}"
          curl -X POST -H "Content-type: application/json" \
            --data "{\"text\":\"❌ *Test deployment failed.*\nBranch: ${BRANCH} | Commit: ${SHORT_SHA} | By: ${ACTOR} | Run: ${RUN_URL}\"}" \
            "${SLACK_WEBHOOK}"
