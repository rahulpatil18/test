name: Test Slack Notification

on:
  workflow_dispatch:
    inputs:
      simulate_failure:
        description: 'Simulate a deployment failure? (true/false)'
        required: false
        default: 'false'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Simulate Deployment
        run: |
          if [ "${{ github.event.inputs.simulate_failure }}" = "true" ]; then
            echo "Simulating failure..."
            exit 1
          fi
          echo "Simulating successful deployment..."

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send Slack Notification
        uses: Gamesight/slack-workflow-status@68bf00d0dbdbcb206c278399aa1ef6c14f74347a
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          slack_webhook_url: ${{ secrets.SLACK_NOTIFICATIONS_WEBHOOK }}
          channel: '#deploy-test'
          name: 'Prod Backend & Admin Portal'
          include_commit_message: true
          icon_emoji: ':rocket:'
